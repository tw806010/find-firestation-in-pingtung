// 2. 直線距離計算（Haversine 公式）
function haversine(lat1, lon1, lat2, lon2) {
  const R = 6371;
  const dLat = (lat2 - lat1) * Math.PI / 180;
  const dLon = (lon2 - lon1) * Math.PI / 180;
  const a = Math.sin(dLat / 2) ** 2 +
            Math.cos(lat1 * Math.PI / 180) * Math.cos(lat2 * Math.PI / 180) *
            Math.sin(dLon / 2) ** 2;
  const c = 2 * Math.atan2(Math.sqrt(a), Math.sqrt(1 - a));
  return R * c;
}

// 3. 快捷標籤填入
function fillHint(value) {
  document.getElementById('addressInput').value = value;
  doSearch();
}

// 4. 核心查詢功能
async function doSearch() {
  const query = document.getElementById('addressInput').value.trim();
  if (!query) return;

  const searchBtn = document.getElementById('searchBtn');
  const spinner = document.getElementById('spinner');
  const statusText = document.getElementById('statusText');
  const resultsDiv = document.getElementById('results');

  searchBtn.disabled = true;
  spinner.style.display = 'block';
  statusText.textContent = '正在查詢地址座標，請稍候⋯';
  resultsDiv.style.display = 'none';
  resultsDiv.innerHTML = '';

  let searchKey = query;
  if (!searchKey.startsWith('屏東') && !searchKey.startsWith('台灣') && !searchKey.startsWith('臺灣')) {
    searchKey = '屏東縣' + searchKey;
  }

  try {
    const url = `https://nominatim.openstreetmap.org/search?q=${encodeURIComponent(searchKey)}&format=json&limit=1&countrycodes=tw`;
    const response = await fetch(url, {
      headers: { 'User-Agent': 'PingtungFireDept-WebApp/1.0' }
    });

    if (!response.ok) throw new Error('網路連線異常');

    const data = await response.json();
    if (!data || data.length === 0) {
      throw new Error(`找不到「${query}」的地址資訊，請確認地址是否正確，或嘗試改用鄉鎮名稱查詢。`);
    }

    const targetLat = parseFloat(data[0].lat);
    const targetLon = parseFloat(data[0].lon);

    const calculated = STATIONS.map(station => {
      return Object.assign({}, station, {
        dist: haversine(targetLat, targetLon, station.lat, station.lon)
      });
    }).sort((a, b) => a.dist - b.dist);

    const top3 = calculated.slice(0, 3);
    const rankTitles = ["最近分隊", "第二近", "第三近"];

    statusText.textContent = '';
    spinner.style.display = 'none';
    resultsDiv.style.display = 'block';

    resultsDiv.innerHTML = `
      <div class="results-header">
        <h3>查詢結果</h3>
        <div class="target-addr">&#x1F4CD; ${query}</div>
        <div class="divider"></div>
      </div>
    `;

    top3.forEach((item, index) => {
      const card = document.createElement('div');
      card.className = `station-card rank-${index + 1}`;

      const displayDist = item.dist < 1 ? (item.dist * 1000).toFixed(0) : item.dist.toFixed(2);
      const displayUnit = item.dist < 1 ? "公尺" : "公里";

      card.innerHTML = `
        <div class="rank-badge">${index + 1}</div>
        <div class="card-content">
          <div class="card-battalion">${item.battalion || "第四大隊"}｜${rankTitles[index]}</div>
          <div class="card-name">${item.fullName}</div>
          <div class="card-info-row">
            <span class="info-icon">&#x1F4CD;</span>
            <span class="info-label">地&ensp;&ensp;址</span>
            <span class="info-value">&ensp;${item.address}</span>
          </div>
          <div class="card-info-row">
            <span class="info-icon">&#x1F4DE;</span>
            <span class="info-label">服務電話</span>
            <span class="info-value">&ensp;<a class="phone-link" href="tel:${item.phone.replace(/-/g, '')}">${item.phone}</a></span>
          </div>
        </div>
        <div class="card-distance">
          <div class="distance-num">${displayDist}</div>
          <div class="distance-unit">${displayUnit}</div>
          <div class="distance-note">直線距離</div>
        </div>
      `;
      resultsDiv.appendChild(card);
    });

  } catch (error) {
    spinner.style.display = 'none';
    statusText.textContent = '';
    resultsDiv.style.display = 'block';
    resultsDiv.innerHTML = `<div class="error-box">&#x26A0;&#xFE0F; ${error.message || '查詢失敗，請稍後再試。'}</div>`;
  } finally {
    searchBtn.disabled = false;
  }
}

// ==========================================
// 🛡️ 網頁安全防護機制：阻擋右鍵、F12 及相關組合鍵
// ==========================================

//確保網頁 DOM 元素載入完成後再進行事件綁定
document.addEventListener('DOMContentLoaded', function() {
  // 綁定 Enter 鍵
  const addressInput = document.getElementById('addressInput');
  if (addressInput) {
    addressInput.addEventListener('keydown', function(e) {
      if (e.key === 'Enter') {
        e.stopPropagation(); // 防止事件向上冒泡觸發防護機制
        doSearch();
      }
    });
  }

  // 1. 停用滑鼠右鍵選單
  document.addEventListener('contextmenu', function(e) {
    e.preventDefault();
  });

  // 2. 精準阻擋 F12 鍵、Ctrl+Shift+I 等組合鍵，不誤傷正常輸入
  document.addEventListener('keydown', function(e) {
    // 阻擋 F12
    if (e.key === 'F12') {
      e.preventDefault();
      return;
    }
    
    // 檢查是否按下了 Ctrl (Windows/Linux) 或 Cmd (Mac)
    const isModifier = e.ctrlKey || e.metaKey;
    
    if (isModifier) {
      // 阻擋 Ctrl/Cmd + Shift + I 或 J (開發者工具)
      if (e.shiftKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) {
        e.preventDefault();
        return;
      }
      // 阻擋 Ctrl/Cmd + U (檢視原始碼)
      if (e.key === 'U' || e.key === 'u') {
        e.preventDefault();
        return;
      }
    }
    
    // Mac 專用：阻擋 Cmd + Opt + I / J
    if (e.metaKey && e.altKey && (e.key === 'I' || e.key === 'i' || e.key === 'J' || e.key === 'j')) {
      e.preventDefault();
      return;
    }
  });
});
</script>
