function haversine(lat1,lon1,lat2,lon2){
  const R=6371,dLat=(lat2-lat1)*Math.PI/180,dLon=(lon2-lon1)*Math.PI/180;
  const a=Math.sin(dLat/2)**2+Math.cos(lat1*Math.PI/180)*Math.cos(lat2*Math.PI/180)*Math.sin(dLon/2)**2;
  return R*2*Math.atan2(Math.sqrt(a),Math.sqrt(1-a));
}
function fillHint(t){document.getElementById("addressInput").value=t;doSearch();}
document.getElementById("addressInput").addEventListener("keydown",function(e){if(e.key==="Enter")doSearch();});
async function doSearch(){
  const input=document.getElementById("addressInput").value.trim();
  if(!input)return;
  const btn=document.getElementById("searchBtn");
  const spinner=document.getElementById("spinner");
  const statusT=document.getElementById("statusText");
  const resultsEl=document.getElementById("results");
  btn.disabled=true; spinner.style.display="block";
  statusT.textContent="正在查詢地址座標，請稍候⋯";
  resultsEl.style.display="none"; resultsEl.innerHTML="";
  let query=input;
  if(!query.startsWith("屏東")&&!query.startsWith("台灣")&&!query.startsWith("臺灣"))
    query="屏東縣"+query;
  try{
    const url="https://nominatim.openstreetmap.org/search?q="+encodeURIComponent(query)+"&format=json&limit=1&countrycodes=tw";
    const resp=await fetch(url,{headers:{"User-Agent":"PingtungFireDept-WebApp/1.0"}});
    if(!resp.ok)throw new Error("網路連線異常");
    const data=await resp.json();
    if(!data||data.length===0)throw new Error("找不到「"+input+"」的地址資訊，請確認地址是否正確，或嘗試改用鄉鎮名稱查詢。");
    const userLat=parseFloat(data[0].lat),userLon=parseFloat(data[0].lon);
    const sorted=STATIONS.map(function(s){return Object.assign({},s,{dist:haversine(userLat,userLon,s.lat,s.lon)});}).sort(function(a,b){return a.dist-b.dist;});
    const top3=sorted.slice(0,3);
    const rankTitles=["最近分隊","第二近","第三近"];
    statusT.textContent=""; spinner.style.display="none";
    resultsEl.style.display="block";
    resultsEl.innerHTML='<div class="results-header"><h3>查詢結果</h3><div class="target-addr">&#x1F4CD; '+input+'</div><div class="divider"></div></div>';
    top3.forEach(function(s,i){
      const card=document.createElement("div");
      card.className="station-card rank-"+(i+1);
      const distVal=s.dist<1?(s.dist*1000).toFixed(0):s.dist.toFixed(2);
      const distUnit=s.dist<1?"公尺":"公里";
      card.innerHTML=
        '<div class="rank-badge">'+(i+1)+'</div>'+
        '<div class="card-content">'+
          '<div class="card-battalion">'+s.battalion+'｜'+rankTitles[i]+'</div>'+
          '<div class="card-name">'+s.fullName+'</div>'+
          '<div class="card-info-row"><span class="info-icon">&#x1F4CD;</span><span class="info-label">地&ensp;&ensp;址</span><span class="info-value">&ensp;'+s.address+'</span></div>'+
          '<div class="card-info-row"><span class="info-icon">&#x1F4DE;</span><span class="info-label">服務電話</span><span class="info-value">&ensp;<a class="phone-link" href="tel:'+s.phone.replace(/-/g,"")+'">'+s.phone+'</a></span></div>'+
        '</div>'+
        '<div class="card-distance">'+
          '<div class="distance-num">'+distVal+'</div>'+
          '<div class="distance-unit">'+distUnit+'</div>'+
          '<div class="distance-note">直線距離</div>'+
        '</div>';
      resultsEl.appendChild(card);
    });
  }catch(err){
    spinner.style.display="none"; statusT.textContent="";
    resultsEl.style.display="block";
    resultsEl.innerHTML='<div class="error-box">&#x26A0;&#xFE0F; '+(err.message||"查詢失敗，請稍後再試。")+'</div>';
  }finally{btn.disabled=false;}
}
</script>
</body>
